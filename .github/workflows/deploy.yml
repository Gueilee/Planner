name: Deploy to Portainer

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Redeploy stack no Portainer (força rebuild)
        run: |
          TOKEN=$(curl -sk -X POST \
            "${{ secrets.PORTAINER_URL }}/api/auth" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${{ secrets.PORTAINER_USERNAME }}\",\"password\":\"${{ secrets.PORTAINER_PASSWORD }}\"}" \
            | jq -r '.jwt')

          curl -sk -X POST \
            "${{ secrets.PORTAINER_URL }}/api/stacks/2/git/redeploy?endpointId=3" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"pullImage\":true,\"repositoryReferenceName\":\"refs/heads/main\",\"repositoryAuthentication\":true,\"repositoryUsername\":\"x-access-token\",\"repositoryPassword\":\"${{ secrets.GH_PAT }}\"}"
