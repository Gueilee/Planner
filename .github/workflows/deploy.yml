name: Deploy to Portainer

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Force rebuild via Portainer API
        run: |
          PORTAINER_URL="${{ secrets.PORTAINER_URL }}"
          GH_PAT="${{ secrets.GH_PAT }}"

          # 1. Autenticar
          TOKEN=$(curl -sk -X POST "$PORTAINER_URL/api/auth" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${{ secrets.PORTAINER_USERNAME }}\",\"password\":\"${{ secrets.PORTAINER_PASSWORD }}\"}" \
            | jq -r '.jwt')
          echo "Autenticado no Portainer"

          # 2. Parar o stack
          curl -sk -X POST "$PORTAINER_URL/api/stacks/2/stop?endpointId=3" \
            -H "Authorization: Bearer $TOKEN"
          echo "Stack parado"
          sleep 5

          # 3. Apagar a imagem antiga (força rebuild no próximo deploy)
          IMAGE_ID=$(curl -sk "$PORTAINER_URL/api/endpoints/3/docker/images/json" \
            -H "Authorization: Bearer $TOKEN" \
            | jq -r '.[] | select(.RepoTags != null) | select(.RepoTags[] | contains("planner-planner")) | .Id' | head -1)

          if [ -n "$IMAGE_ID" ] && [ "$IMAGE_ID" != "null" ]; then
            curl -sk -X DELETE "$PORTAINER_URL/api/endpoints/3/docker/images/$IMAGE_ID?force=true" \
              -H "Authorization: Bearer $TOKEN"
            echo "Imagem $IMAGE_ID apagada"
          else
            echo "Nenhuma imagem planner-planner encontrada"
          fi

          # 4. Redeploy com novo código (docker-compose rebuild pois imagem não existe)
          curl -sk -X POST "$PORTAINER_URL/api/stacks/2/git/redeploy?endpointId=3" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"pullImage\":false,\"repositoryReferenceName\":\"refs/heads/main\",\"repositoryAuthentication\":true,\"repositoryUsername\":\"x-access-token\",\"repositoryPassword\":\"$GH_PAT\"}"
          echo "Redeploy iniciado"
