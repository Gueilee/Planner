name: Deploy to Portainer

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (rebuild Docker image)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 191.232.234.87
          username: azureuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            STACK_DIR=$(docker inspect planner-planner-1 \
              --format '{{ index .Config.Labels "com.docker.compose.project.working_dir" }}')
            echo "Stack dir: $STACK_DIR"
            cd "$STACK_DIR"
            git remote set-url origin "https://x-access-token:${{ secrets.GH_PAT }}@github.com/vendemmia-logistica/Planner.git"
            git fetch origin main
            git reset --hard origin/main
            docker compose up --build -d --remove-orphans
